<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation</title>
    <link rel="stylesheet" href="nav_styles.css">

</head>
<body>
    <div class="nav">
        <div class="logo">
            <img src="food_logo.png"> 
        </div>


        <div class="delivery">
            <div class="deliver_to">
                <b>Deliver to:</b>
            </div>

            <div class="map">
                <img src="mapmark.png"> 
            </div>

            <div class="address">
                Current Location: <b> Mohammadpur Bus Stand, Dhaka </b>
            </div>
                    
        </div>



        <div class="search_login">

            <div>
                <button class="search"> 
                    <div>
                        <img class="search_icon" src="search_icon.png"> 
                    </div>
                    
                    <div class="search_text">
                        SearchFood
                    </div>
                </button>
            </div>
           

            <div>
                <button class="login">
                    <div>
                        <img class="user_logo" src="user_logo.png">
                    </div>
                    
                    <div class="login_text">
                        Login
                    </div>
                </button>
            </div>
         
    </div>

</body>
</html>
