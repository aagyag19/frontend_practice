<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Main</title>
     <link rel="stylesheet" href="top_main_style.css">
</head>
<body>

    <div class="heading">

        <div class="heading_content">
                       

            <div class="heading_text">
                <div class="big_heading">
                    Are you starving?
                </div>
                            
                <div class="small_heading">
                    Within a few clicks, find meals that are accessible near you
                </div>
            </div>


            <div class="heading_delivery">
                <div class="upper_delivery">
                    
                        <button class="delivery_btn">
                            <div class="delivery_img">
                                <img src="bike.png">
                            </div>

                            <div class="delivery_text">
                                Delivery
                            </div>
                        </button>

                    

                    
                        <button class="pickup_btn">
                            <div class="pickup_img">
                                <img src="pickup.png">
                            </div>

                            <div class="pickup_text">
                                Pickup
                            </div>
                        </button>

                    

                </div>

                <div class="lower">
                    <div class="field">
                        <div class="enter_address">

                            <div>
                               <img class="enter_img" src="enter.png">
                            </div>

                            <div>
                               <input class="typing" placeholder="Enter your address">
                            </div>

                        </div>


                        <div>
                            

                        <button class="find"> 
                            <div>
                                <img class="search_icon" src="search_icon2.png"> 
                            </div>
                                
                            <div class="find_text">
                                Find Food
                            </div>

                        </button>
                    </div>
                </div>
                </div>


                </div>

            </div>


            <div class="heading_image">
                <img src="heading_img.png">
            </div>

        </div>
                
    </div>

</body>
</html>
